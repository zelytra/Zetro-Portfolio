---
## zetro-backend image version
##

deployment:
  image:
    repository: /zetro-backend
    pullPolicy: Always
  replicas: 1
  securityContext:
    enabled: true
  rolling:
    maxSurge: "25%"
    maxUnavailable: "25%"
  resources:
    requests:
      cpu: 250m
      memory: 256Mi
    limits:
      cpu: "1"
      memory: 512Mi

service:
  port: 80
  targetPort: 8080

ingress:
  prefix: ""
  suffix: ""

config:
  LOGGER_NAME: zetro-backend-logger
