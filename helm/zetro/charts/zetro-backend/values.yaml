---
## zetro-backend image version
##

deployment:
  image:
    repository: /zetro-backend
    pullPolicy: Always
  replicas: 1
  securityContext:
    enabled: true
  rolling:
    maxSurge: "25%"
    maxUnavailable: "25%"
  resources:
    # Keep CPU/memory *requests* modest so the pod schedules on a busy node,
    # but allow the *limit* to burst to a full core so the Quarkus/Hibernate
    # JVM can boot quickly and establish its DB connection in time.
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: "1"
      memory: 512Mi

service:
  port: 80
  targetPort: 8080

ingress:
  prefix: ""
  suffix: ""

config:
  LOGGER_NAME: zetro-backend-logger
